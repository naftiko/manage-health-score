naftiko: "0.5"
info:
  label: "Track Popularity Metrics"
  description: "Aggregates GitHub stars, forks, and traffic across all org repos plus LinkedIn follower count. Maps to Health Score Pillar 2: Popularity (20%)."
  tags:
    - health-score
    - popularity
    - pillar-2
  created: "2026-03-22"
  modified: "2026-03-22"

capability:
  exposes:
    - type: "mcp"
      namespace: "health-score"
      tools:
        - name: "get-popularity-metrics"
          description: "Returns popularity metrics for a GitHub org: total stars, total forks, traffic views, and LinkedIn follower count. Use this to assess Pillar 2 of the Naftiko health score."
          inputParameters:
            - name: org
              in: body
              type: string
            - name: linkedin_org_id
              in: body
              type: string
          steps:
            - name: list-repos
              type: call
              call: "github.list-org-repos"
              with:
                org: "{{org}}"
                per_page: "100"
                type: "public"
            - name: get-linkedin-org
              type: call
              call: "linkedin.get-organization"
              with:
                org_id: "{{linkedin_org_id}}"
          outputParameters:
            - name: total_stars
              type: number
              mapping: "{{list-repos.items | sum('stargazers_count')}}"
            - name: total_forks
              type: number
              mapping: "{{list-repos.items | sum('forks_count')}}"
            - name: total_watchers
              type: number
              mapping: "{{list-repos.items | sum('watchers_count')}}"
            - name: linkedin_followers
              type: number
              mapping: "{{get-linkedin-org.staffCount}}"
            - name: repo_count
              type: number
              mapping: "{{list-repos.items | length}}"
            - name: pillar_score
              type: number
              mapping: "{{compute_pillar_2(total_stars, total_forks, linkedin_followers)}}"

  consumes:
    - type: "http"
      namespace: "github"
      baseUri: "https://api.github.com"
      authentication:
        type: "bearer"
        token: "{{github_token}}"
      inputParameters:
        - name: "github_token"
          in: "environment"
        - name: "Accept"
          in: "header"
          value: "application/vnd.github+json"
        - name: "X-GitHub-Api-Version"
          in: "header"
          value: "2022-11-28"
      resources:
        - name: "org-repos"
          label: "Organization Repositories"
          description: "List all repositories for a GitHub organization"
          path: "/orgs/{{org}}/repos"
          inputParameters:
            - name: "org"
              in: "path"
            - name: "type"
              in: "query"
            - name: "per_page"
              in: "query"
          operations:
            - name: "list-org-repos"
              method: "GET"
              label: "List Org Repos"
              outputParameters:
                - name: "items"
                  type: "array"
                  value: "$"

        - name: "repo-traffic"
          label: "Repository Traffic"
          description: "Get traffic views for a repository"
          path: "/repos/{{org}}/{{repo}}/traffic/views"
          inputParameters:
            - name: "org"
              in: "path"
            - name: "repo"
              in: "path"
          operations:
            - name: "get-traffic-views"
              method: "GET"
              label: "Get Traffic Views"
              outputParameters:
                - name: "count"
                  type: "number"
                  value: "$.count"
                - name: "uniques"
                  type: "number"
                  value: "$.uniques"

    - import: "shared-linkedin.yml"
      as: "linkedin"
